name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, check [Troubleshooting](https://weppyai.com/en/docs/troubleshooting/)
        and [Discussions](https://github.com/hope1026/weppy-roblox-mcp/discussions).
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14 / Windows 11"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version output"
    validations:
      required: true
  - type: input
    id: ai-client
    attributes:
      label: AI client
      placeholder: "Claude Code 1.x / Cursor 0.4x / Codex CLI"
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin / MCP server version
      placeholder: "v1.3.1"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: upload
    id: diagnostics-zip
    attributes:
      label: Diagnostics ZIP (optional)
      description: Attach the diagnostics.zip generated by WEPPY Dashboard. You can submit without it, but attaching it helps us investigate faster.
    validations:
      required: false
      accept: ".zip"
  - type: textarea
    id: logs
    attributes:
      label: Diagnostics ZIP note
      description: WEPPY Dashboard fills this in with the generated ZIP filename. Attach the ZIP itself in the field above.
