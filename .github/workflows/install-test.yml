name: Install Script E2E Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-distribution-layout:
    name: Distribution layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify — public repo WEPPY Roblox AI Toolkit layout
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = process.cwd();
          const expectedSkills = [
            {
              name: 'weppy-roblox-mcp-guide',
              references: ['mcp-actions.md', 'multi-studio-routing.md', 'ui-studio.md', 'playtest.md'],
            },
            {
              name: 'weppy-roblox-sync-guide',
              references: ['sync-workflow.md', 'sync-format.md', 'conflicts.md', 'sourcemap.md', 'roblox-explorer.md'],
            },
            {
              name: 'weppy-roblox-assets-guide',
              references: ['asset-library.md', 'generated-assets.md', 'studio-upload.md', 'open-cloud-upload.md'],
            },
          ];
          const required = [
            'README.md',
            'LICENSE',
            'CHANGELOG.md',
            'docs',
            'glama.json',
            'smithery.yaml',
            'Dockerfile',
            'install.sh',
            'install.ps1',
            '.claude-plugin/marketplace.json',
            '.agents/plugins/marketplace.json',
            'plugins/weppy-roblox-mcp/.claude-plugin/plugin.json',
            'plugins/weppy-roblox-mcp/.codex-plugin/plugin.json',
            'plugins/weppy-roblox-mcp/.mcp.json',
            'plugins/weppy-roblox-mcp/plugin.json',
            'plugins/weppy-roblox-mcp/mcp_config.json',
            'plugins/weppy-roblox-mcp/skill-coverage.yaml',
            'plugins/weppy-roblox-mcp/skills/weppy-roblox-mcp-guide/SKILL.md',
            'plugins/weppy-roblox-mcp/skills/weppy-roblox-sync-guide/SKILL.md',
            'plugins/weppy-roblox-mcp/skills/weppy-roblox-assets-guide/SKILL.md',
          ];
          const forbidden = [
            'package.json',
            '.npmignore',
            'plugins/weppy-roblox-mcp/dist',
            'plugins/weppy-roblox-mcp/dashboard',
            'plugins/weppy-roblox-mcp/roblox-plugin',
          ];

          for (const relativePath of required) {
            if (!fs.existsSync(path.join(root, relativePath))) {
              throw new Error(`Missing public repo file: ${relativePath}`);
            }
          }

          for (const relativePath of forbidden) {
            if (fs.existsSync(path.join(root, relativePath))) {
              throw new Error(`Unexpected public repo runtime artifact: ${relativePath}`);
            }
          }

          for (const jsonPath of [
            '.claude-plugin/marketplace.json',
            '.agents/plugins/marketplace.json',
            'plugins/weppy-roblox-mcp/.claude-plugin/plugin.json',
            'plugins/weppy-roblox-mcp/.codex-plugin/plugin.json',
            'plugins/weppy-roblox-mcp/.mcp.json',
            'plugins/weppy-roblox-mcp/plugin.json',
            'plugins/weppy-roblox-mcp/mcp_config.json',
            'plugins/weppy-roblox-mcp/skill-coverage.yaml',
          ]) {
            JSON.parse(fs.readFileSync(path.join(root, jsonPath), 'utf8'));
          }

          const claudePlugin = JSON.parse(fs.readFileSync(path.join(root, 'plugins/weppy-roblox-mcp/.claude-plugin/plugin.json'), 'utf8'));
          const codexPlugin = JSON.parse(fs.readFileSync(path.join(root, 'plugins/weppy-roblox-mcp/.codex-plugin/plugin.json'), 'utf8'));
          const codexMarketplace = JSON.parse(fs.readFileSync(path.join(root, '.agents/plugins/marketplace.json'), 'utf8'));
          const codexMcp = JSON.parse(fs.readFileSync(path.join(root, 'plugins/weppy-roblox-mcp/.mcp.json'), 'utf8'));
          const antigravityPlugin = JSON.parse(fs.readFileSync(path.join(root, 'plugins/weppy-roblox-mcp/plugin.json'), 'utf8'));
          const antigravityMcp = JSON.parse(fs.readFileSync(path.join(root, 'plugins/weppy-roblox-mcp/mcp_config.json'), 'utf8'));
          const expected = { command: 'npx', args: ['-y', '@weppy/roblox-mcp@latest'] };

          if (codexMarketplace.interface?.displayName !== 'WEPPY Roblox AI Toolkit') {
            throw new Error('Codex marketplace display name must be WEPPY Roblox AI Toolkit');
          }
          if (codexMarketplace.plugins?.[0]?.name !== 'weppy-roblox-ai-toolkit') {
            throw new Error('Codex marketplace plugin id must be weppy-roblox-ai-toolkit');
          }
          if (JSON.stringify(codexMarketplace.plugins?.[0]?.source) !== JSON.stringify({ source: 'local', path: './plugins/weppy-roblox-mcp' })) {
            throw new Error('Codex marketplace source must point to local plugin path');
          }
          if (claudePlugin.name !== 'weppy-roblox-ai-toolkit') {
            throw new Error('Claude plugin id must be weppy-roblox-ai-toolkit');
          }
          if (codexPlugin.name !== 'weppy-roblox-ai-toolkit') {
            throw new Error('Codex plugin id must be weppy-roblox-ai-toolkit');
          }
          if (codexPlugin.interface?.displayName !== 'WEPPY Roblox AI Toolkit') {
            throw new Error('Codex plugin display name must be WEPPY Roblox AI Toolkit');
          }
          if (JSON.stringify(claudePlugin.mcpServers?.['weppy-roblox-mcp']) !== JSON.stringify(expected)) {
            throw new Error('Claude plugin MCP command is not @latest npm command');
          }
          if (codexPlugin.mcpServers !== './.mcp.json') {
            throw new Error('Codex plugin mcpServers must point to ./.mcp.json');
          }
          if (codexPlugin.skills !== './skills/') {
            throw new Error('Codex plugin skills must point to ./skills/');
          }
          if (claudePlugin.skills !== undefined) {
            throw new Error('Claude plugin should use the plugin-root skills directory without a duplicate skills field');
          }
          if (JSON.stringify(codexMcp.mcp_servers?.['weppy-roblox-mcp']) !== JSON.stringify(expected)) {
            throw new Error('Codex plugin MCP command is not @latest npm command');
          }
          if (JSON.stringify(antigravityPlugin) !== JSON.stringify({
            name: 'weppy-roblox-ai-toolkit',
            description: 'WEPPY Roblox AI Toolkit setup for Antigravity.',
          })) {
            throw new Error('Antigravity plugin manifest is invalid');
          }
          if (JSON.stringify(antigravityMcp.mcpServers?.['weppy-roblox-mcp']) !== JSON.stringify(expected)) {
            throw new Error('Antigravity plugin MCP command is not @latest npm command');
          }

          const parseFrontmatter = (markdown) => {
            const match = markdown.match(/^---\n([\s\S]*?)\n---\n/);
            if (!match) throw new Error('SKILL.md missing YAML frontmatter');
            const values = {};
            for (const line of match[1].split('\n')) {
              const entry = line.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
              if (entry) values[entry[1]] = entry[2].replace(/^["']|["']$/g, '').trim();
            }
            return values;
          };

          for (const skill of expectedSkills) {
            const skillRoot = path.join(root, 'plugins/weppy-roblox-mcp/skills', skill.name);
            const skillMarkdown = fs.readFileSync(path.join(skillRoot, 'SKILL.md'), 'utf8');
            const frontmatter = parseFrontmatter(skillMarkdown);
            if (frontmatter.name !== skill.name) {
              throw new Error(`Skill frontmatter name mismatch: ${skill.name}`);
            }
            if (!frontmatter.description) {
              throw new Error(`Skill description is empty: ${skill.name}`);
            }
            if (!fs.existsSync(path.join(skillRoot, 'agents/openai.yaml'))) {
              throw new Error(`Missing Codex skill metadata: ${skill.name}`);
            }
            for (const reference of skill.references) {
              const referencePath = path.join(skillRoot, 'references', reference);
              if (!fs.existsSync(referencePath)) {
                throw new Error(`Missing skill reference: ${skill.name}/${reference}`);
              }
              if (!fs.readFileSync(referencePath, 'utf8').trim()) {
                throw new Error(`Empty skill reference: ${skill.name}/${reference}`);
              }
            }
          }

          const generatedActions = fs.readFileSync(
            path.join(root, 'plugins/weppy-roblox-mcp/skills/weppy-roblox-mcp-guide/references/mcp-actions.md'),
            'utf8',
          );
          if (!generatedActions.includes('AUTO-GENERATED from tool-codegen/tools.yaml')) {
            throw new Error('mcp-actions.md must be generated from tool-codegen');
          }

          const coverage = JSON.parse(fs.readFileSync(
            path.join(root, 'plugins/weppy-roblox-mcp/skill-coverage.yaml'),
            'utf8',
          ));
          if (coverage.version !== 1) {
            throw new Error(`Unsupported skill coverage version: ${coverage.version}`);
          }
          const mappedActions = new Set();
          for (const [groupName, group] of Object.entries(coverage.groups || {})) {
            const referencePath = path.join(
              root,
              'plugins/weppy-roblox-mcp/skills',
              group.skill,
              group.reference,
            );
            if (!fs.existsSync(referencePath)) {
              throw new Error(`Missing workflow reference for ${groupName}: ${referencePath}`);
            }
            for (const action of group.actions || []) {
              if (!/^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$/.test(action)) {
                throw new Error(`Invalid workflow action for ${groupName}: ${action}`);
              }
              if (mappedActions.has(action)) {
                throw new Error(`Duplicate workflow action mapping: ${action}`);
              }
              mappedActions.add(action);
            }
          }
          for (const exception of coverage.exceptions || []) {
            if (!exception.action || !exception.generatedOnlyReason?.trim()) {
              throw new Error('Invalid generated-only workflow exception');
            }
            if (mappedActions.has(exception.action)) {
              throw new Error(`Duplicate workflow action mapping: ${exception.action}`);
            }
            mappedActions.add(exception.action);
          }

          console.log('✓ Public repo WEPPY Roblox AI Toolkit layout verified');
          NODE

      - name: Verify — published npm package runtime tarball shape
        run: |
          npm pack --dry-run --json @weppy/roblox-mcp@latest > npm-pack-published.json
          node <<'NODE'
          const fs = require('fs');
          const pack = JSON.parse(fs.readFileSync('npm-pack-published.json', 'utf8'))[0];
          const paths = pack.files.map((file) => file.path);
          const required = [
            'dist/index.js',
            'dashboard/dist/index.html',
            'roblox-plugin/WeppyRobloxMCP.rbxm',
          ];
          const forbiddenPrefixes = [
            'docs/',
            '.agents/',
            '.claude-plugin/',
            '.codex-plugin/',
            'plugins/weppy-roblox-mcp/',
          ];

          for (const relativePath of required) {
            if (!paths.includes(relativePath)) {
              throw new Error(`Missing npm runtime file: ${relativePath}`);
            }
          }

          for (const relativePath of paths) {
            if (forbiddenPrefixes.some((prefix) => relativePath.startsWith(prefix))) {
              throw new Error(`Unexpected npm tarball file: ${relativePath}`);
            }
          }

          console.log(`✓ published npm package runtime tarball verified (${pack.entryCount} files)`);
          NODE

  test-bash:
    name: E2E — install.sh (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Stub Claude Code CLI binary (force plugin install path)
        run: |
          sudo tee /usr/local/bin/claude > /dev/null <<'EOF'
          #!/usr/bin/env bash
          set -e
          mkdir -p "$HOME/.claude"
          if [ "${1:-}" = "mcp" ] && [ "${2:-}" = "list" ]; then
            if [ -f "$HOME/.claude/weppy-mcp-added" ]; then
              printf 'weppy-roblox-mcp: npx -y @weppy/roblox-mcp@latest\n'
            fi
            exit 0
          fi
          if [ "${1:-}" = "mcp" ] && [ "${2:-}" = "remove" ]; then
            rm -f "$HOME/.claude/weppy-mcp-added"
            exit 0
          fi
          if [ "${1:-}" = "mcp" ] && [ "${2:-}" = "add" ]; then
            printf '%s\n' "$*" > "$HOME/.claude/weppy-mcp-added"
            exit 0
          fi
          if [ "${1:-}" = "plugin" ] && [ "${2:-}" = "marketplace" ] && [ "${3:-}" = "add" ]; then
            printf '%s\n' "${4:-}" > "$HOME/.claude/weppy-marketplace-added"
            exit 0
          fi
          if [ "${1:-}" = "plugin" ] && [ "${2:-}" = "install" ]; then
            printf '%s\n' "${3:-}" > "$HOME/.claude/weppy-plugin-installed"
            exit 0
          fi
          exit 0
          EOF
          sudo chmod +x /usr/local/bin/claude

      - name: Stub codex CLI binary (force CLI detection path)
        run: |
          # Stub `codex` so install.sh hits the CLI detection branch.
          # Implements `codex mcp add NAME -- CMD ARGS...` by appending a
          # [mcp_servers.NAME] block to ~/.codex/config.toml so the post-install
          # verification step (and is_codex_config_configured) can see it.
          sudo tee /usr/local/bin/codex > /dev/null <<'EOF'
          #!/usr/bin/env bash
          set -e
          if [ "${1:-}" = "mcp" ] && [ "${2:-}" = "add" ]; then
            shift 2
            name="$1"; shift
            [ "${1:-}" = "--" ] && shift
            cmd="$1"; shift
            args_json=""
            for a in "$@"; do
              args_json="${args_json}\"$a\", "
            done
            args_json="${args_json%, }"
            mkdir -p "$HOME/.codex"
            {
              printf '\n[mcp_servers.%s]\n' "$name"
              printf 'command = "%s"\n' "$cmd"
              printf 'args = [%s]\n' "$args_json"
            } >> "$HOME/.codex/config.toml"
            exit 0
          fi
          if [ "${1:-}" = "plugin" ] && [ "${2:-}" = "marketplace" ] && [ "${3:-}" = "add" ]; then
            mkdir -p "$HOME/.codex"
            printf '%s\n' "${4:-}" > "$HOME/.codex/weppy-marketplace-added"
            exit 0
          fi
          # Other subcommands (list/remove) are no-ops for the CI stub.
          exit 0
          EOF
          sudo chmod +x /usr/local/bin/codex

      - name: Stub Antigravity CLI binary
        run: |
          sudo tee /usr/local/bin/agy > /dev/null <<'EOF'
          #!/usr/bin/env bash
          set -e
          target="$HOME/.gemini/antigravity-cli/plugins/weppy-roblox-ai-toolkit"
          if [ "${WEPPY_AGY_FAIL:-}" = "1" ] && [ "${1:-}" = "plugin" ]; then
            exit 9
          fi
          if [ "${1:-}" = "plugin" ] && [ "${2:-}" = "install" ]; then
            source_path="${3:-}"
            test -f "$source_path/plugin.json"
            test ! -e "$source_path/.claude-plugin"
            rm -rf "$target"
            mkdir -p "$(dirname "$target")"
            cp -R "$source_path" "$target"
            exit 0
          fi
          if [ "${1:-}" = "plugin" ] && [ "${2:-}" = "list" ]; then
            if [ -f "$target/plugin.json" ]; then
              printf 'weppy-roblox-ai-toolkit enabled\n'
            fi
            exit 0
          fi
          if [ "${1:-}" = "plugin" ] && [ "${2:-}" = "uninstall" ]; then
            rm -rf "$target"
            exit 0
          fi
          exit 0
          EOF
          sudo chmod +x /usr/local/bin/agy

      - name: Verify — Antigravity reinstall outcome matrix on POSIX
        env:
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}/plugins/weppy-roblox-mcp
        run: |
          plugin_source="$WEPPY_ANTIGRAVITY_PLUGIN_SOURCE"
          node_path=$(command -v node)

          seed_native_plugin() {
            target="$1"
            mkdir -p "$target"
            cp -R "$plugin_source/." "$target/"
            rm -rf "$target/.claude-plugin"
          }

          run_antigravity_fixture() {
            fixture_name="$1"
            expected_status="$2"
            fixture_mode="$3"
            fixture_home=$(mktemp -d)
            fixture_bin=$(mktemp -d)
            target="$fixture_home/.gemini/antigravity-cli/plugins/weppy-roblox-ai-toolkit"
            log="$fixture_home/install.log"
            ln -s "$node_path" "$fixture_bin/node"
            printf '#!/usr/bin/env bash\nexit 0\n' > "$fixture_bin/npx"
            chmod +x "$fixture_bin/npx"

            if [ "$fixture_mode" != "cli-missing" ] && [ "$fixture_mode" != "unrecoverable" ]; then
              cp /usr/local/bin/agy "$fixture_bin/agy"
              chmod +x "$fixture_bin/agy"
            fi

            case "$fixture_mode" in
              current)
                seed_native_plugin "$target"
                ;;
              outdated)
                seed_native_plugin "$target"
                node -e "const fs=require('fs');const p=process.argv[1];const v=JSON.parse(fs.readFileSync(p));v.description='old release';fs.writeFileSync(p,JSON.stringify(v,null,2)+'\\n')" "$target/plugin.json"
                ;;
              damaged)
                seed_native_plugin "$target"
                rm -f "$target/skills/weppy-roblox-assets-guide/SKILL.md"
                ;;
              install-failure)
                seed_native_plugin "$target"
                printf 'preserve-me\n' > "$target/rollback-marker"
                ;;
              unrecoverable)
                mkdir -p "$fixture_home/.gemini"
                printf 'blocked\n' > "$fixture_home/.gemini/config"
                ;;
            esac

            set +e
            if [ "$fixture_mode" = "install-failure" ]; then
              HOME="$fixture_home" PATH="$fixture_bin:/usr/bin:/bin" CI=true WEPPY_ANTIGRAVITY_IDE_PRESENT=0 WEPPY_AGY_FAIL=1 WEPPY_ANTIGRAVITY_PLUGIN_SOURCE="$plugin_source" bash install.sh > "$log" 2>&1
            elif [ "$fixture_mode" = "cli-missing" ] || [ "$fixture_mode" = "unrecoverable" ]; then
              HOME="$fixture_home" PATH="$fixture_bin:/usr/bin:/bin" CI=true WEPPY_ANTIGRAVITY_IDE_PRESENT=1 WEPPY_ANTIGRAVITY_PLUGIN_SOURCE="$plugin_source" bash install.sh > "$log" 2>&1
            else
              HOME="$fixture_home" PATH="$fixture_bin:/usr/bin:/bin" CI=true WEPPY_ANTIGRAVITY_IDE_PRESENT=0 WEPPY_ANTIGRAVITY_PLUGIN_SOURCE="$plugin_source" bash install.sh > "$log" 2>&1
            fi
            fixture_exit=$?
            set -e

            if ! grep -Fq "$expected_status" "$log"; then
              cat "$log"
              echo "$fixture_name did not emit $expected_status"
              return 1
            fi
            if grep -Ei 'Antigravity.*skipped or failed|skipped or failed.*Antigravity' "$log"; then
              cat "$log"
              echo "$fixture_name emitted an ambiguous Antigravity warning"
              return 1
            fi
            if [ "$fixture_mode" = "unrecoverable" ]; then
              [ "$fixture_exit" -ne 0 ]
              printf '✓ %s\n' "$fixture_name"
              return 0
            fi
            [ "$fixture_exit" -eq 0 ]

            TEST_HOME="$fixture_home" FIXTURE_MODE="$fixture_mode" node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const home = process.env.TEST_HOME;
          const mode = process.env.FIXTURE_MODE;
          const cli = path.join(home, '.gemini/antigravity-cli/plugins/weppy-roblox-ai-toolkit');
          const sharedPath = path.join(home, '.gemini/config/mcp_config.json');
          const shared = fs.existsSync(sharedPath) ? JSON.parse(fs.readFileSync(sharedPath, 'utf8')) : {};
          const nativeMcp = path.join(cli, 'mcp_config.json');
          const count = Number(Boolean(shared.mcpServers?.['weppy-roblox-mcp'])) + Number(fs.existsSync(nativeMcp));
          if (count !== 1) throw new Error(`expected one WEPPY MCP definition, found ${count}`);
          if (mode === 'cli-missing') {
            if (fs.existsSync(cli)) throw new Error('CLI-missing fixture unexpectedly installed a plugin');
          } else {
            for (const skill of ['weppy-roblox-mcp-guide', 'weppy-roblox-sync-guide', 'weppy-roblox-assets-guide']) {
              if (!fs.existsSync(path.join(cli, 'skills', skill, 'SKILL.md'))) throw new Error(`CLI skill missing: ${skill}`);
            }
          }
          if (mode === 'install-failure' && !fs.existsSync(path.join(cli, 'rollback-marker'))) {
            throw new Error('previous plugin was not restored');
          }
          NODE
            printf '✓ %s\n' "$fixture_name"
          }

          run_antigravity_fixture 'Antigravity clean install' 'installed:' clean
          run_antigravity_fixture 'Antigravity current reinstall' 'reinstalled:' current
          run_antigravity_fixture 'Antigravity outdated update' 'updated:' outdated
          run_antigravity_fixture 'Antigravity damaged repair' 'repaired:' damaged
          run_antigravity_fixture 'Antigravity CLI missing fallback' 'fallback:' cli-missing
          run_antigravity_fixture 'Antigravity install failure rollback' 'fallback:' install-failure
          run_antigravity_fixture 'Antigravity unrecoverable failure' 'failed:' unrecoverable

      - name: Seed Antigravity hybrid profile
        run: |
          mkdir -p "$HOME/.gemini/config" "$HOME/.gemini/antigravity-cli"
          cat > "$HOME/.gemini/config/mcp_config.json" <<'EOF'
          {
            "mcpServers": {
              "other-server": {
                "command": "other-command",
                "args": []
              }
            }
          }
          EOF

      - name: Run install.sh (CI mode, pipe — simulates curl | bash)
        env:
          CI: true
          WEPPY_ANTIGRAVITY_IDE_PRESENT: '1'
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}/plugins/weppy-roblox-mcp
        run: |
          cat install.sh | bash 2>&1 | tee install-output.log
          if grep -q 'SyntaxError' install-output.log; then
            echo "❌ SyntaxError detected in install output"
            exit 1
          fi

      - name: Verify — Antigravity IDE and CLI hybrid mode
        run: |
          target="$HOME/.gemini/config/plugins/weppy-roblox-ai-toolkit"
          test -f "$target/plugin.json"
          test -f "$target/skills/weppy-roblox-mcp-guide/SKILL.md"
          test -f "$target/skills/weppy-roblox-sync-guide/SKILL.md"
          test -f "$target/skills/weppy-roblox-assets-guide/SKILL.md"
          test ! -f "$target/mcp_config.json"
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const home = process.env.HOME;
          const shared = JSON.parse(fs.readFileSync(path.join(home, '.gemini/config/mcp_config.json'), 'utf8'));
          if (!shared.mcpServers?.['other-server']) throw new Error('other-server was not preserved');
          if (!shared.mcpServers?.['weppy-roblox-mcp']) throw new Error('WEPPY shared MCP fallback is missing');
          const cliPath = path.join(home, '.gemini/antigravity-cli/mcp_config.json');
          if (fs.existsSync(cliPath)) {
            const cli = JSON.parse(fs.readFileSync(cliPath, 'utf8'));
            if (cli.mcpServers?.['weppy-roblox-mcp']) throw new Error('duplicate CLI direct MCP remains');
          }
          const cliPlugin = path.join(home, '.gemini/antigravity-cli/plugins/weppy-roblox-ai-toolkit');
          if (!fs.existsSync(path.join(cliPlugin, 'plugin.json'))) throw new Error('CLI skill-only plugin is missing');
          if (fs.existsSync(path.join(cliPlugin, 'mcp_config.json'))) throw new Error('CLI hybrid plugin retained native MCP config');
          console.log('✓ Antigravity IDE and CLI hybrid mode verified');
          NODE

      - name: Verify — Antigravity CLI hybrid skill-only view
        run: |
          target="$HOME/.gemini/antigravity-cli/plugins/weppy-roblox-ai-toolkit"
          test -f "$target/plugin.json"
          test ! -f "$target/mcp_config.json"
          test -f "$target/skills/weppy-roblox-mcp-guide/SKILL.md"
          test -f "$target/skills/weppy-roblox-sync-guide/SKILL.md"
          test -f "$target/skills/weppy-roblox-assets-guide/SKILL.md"
          test ! -e "$target/.claude-plugin"
          printf '✓ Antigravity CLI hybrid skill-only plugin verified\n'

      - name: Verify — Antigravity CLI native-only mode
        env:
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}/plugins/weppy-roblox-mcp
        run: |
          fixture_home=$(mktemp -d)
          fixture_bin=$(mktemp -d)
          printf '#!/usr/bin/env bash\nexit 0\n' > "$fixture_bin/npx"
          chmod +x "$fixture_bin/npx"
          HOME="$fixture_home" PATH="$fixture_bin:$PATH" CI=true bash install.sh > "$fixture_home/install.log" 2>&1
          TEST_HOME="$fixture_home" node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const home = process.env.TEST_HOME;
          const sharedPath = path.join(home, '.gemini/config/mcp_config.json');
          const pluginPath = path.join(home, '.gemini/antigravity-cli/plugins/weppy-roblox-ai-toolkit/mcp_config.json');
          const shared = fs.existsSync(sharedPath) ? JSON.parse(fs.readFileSync(sharedPath, 'utf8')) : {};
          const count = Number(Boolean(shared.mcpServers?.['weppy-roblox-mcp'])) + Number(fs.existsSync(pluginPath));
          if (count !== 1 || !fs.existsSync(pluginPath)) throw new Error(`expected one native WEPPY definition, found ${count}`);
          NODE

      - name: Verify — Antigravity native failure fallback
        env:
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}/plugins/weppy-roblox-mcp
        run: |
          fixture_home=$(mktemp -d)
          fixture_bin=$(mktemp -d)
          printf '#!/usr/bin/env bash\nexit 0\n' > "$fixture_bin/npx"
          chmod +x "$fixture_bin/npx"
          HOME="$fixture_home" PATH="$fixture_bin:$PATH" CI=true WEPPY_AGY_FAIL=1 bash install.sh > "$fixture_home/install.log" 2>&1
          grep -q 'MCP fallback preserved' "$fixture_home/install.log"
          TEST_HOME="$fixture_home" node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const home = process.env.TEST_HOME;
          const shared = JSON.parse(fs.readFileSync(path.join(home, '.gemini/config/mcp_config.json'), 'utf8'));
          const pluginPath = path.join(home, '.gemini/antigravity-cli/plugins/weppy-roblox-ai-toolkit/mcp_config.json');
          const count = Number(Boolean(shared.mcpServers?.['weppy-roblox-mcp'])) + Number(fs.existsSync(pluginPath));
          if (count !== 1 || fs.existsSync(pluginPath)) throw new Error(`expected one shared fallback definition, found ${count}`);
          NODE

      - name: Verify — Antigravity legacy config migration
        env:
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}/plugins/weppy-roblox-mcp
        run: |
          fixture_home=$(mktemp -d)
          fixture_bin=$(mktemp -d)
          printf '#!/usr/bin/env bash\nexit 0\n' > "$fixture_bin/npx"
          chmod +x "$fixture_bin/npx"
          mkdir -p "$fixture_home/.gemini/config" "$fixture_home/.gemini/antigravity-cli"
          printf '{"mcpServers":{"other-server":{"command":"other","args":[]}}}\n' > "$fixture_home/.gemini/config/mcp_config.json"
          printf '{"topLevel":"keep","mcpServers":{"other-server":{"command":"legacy-other","args":[]},"weppy-roblox-mcp":{"command":"npx","args":["-y","@weppy/roblox-mcp@latest"]}}}\n' > "$fixture_home/.gemini/antigravity-cli/mcp_config.json"
          HOME="$fixture_home" PATH="$fixture_bin:$PATH" CI=true bash install.sh > "$fixture_home/install.log" 2>&1
          compgen -G "$fixture_home/.gemini/config/mcp_config.json.weppy-backup-*" >/dev/null
          compgen -G "$fixture_home/.gemini/antigravity-cli/mcp_config.json.weppy-backup-*" >/dev/null
          TEST_HOME="$fixture_home" node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const home = process.env.TEST_HOME;
          const shared = JSON.parse(fs.readFileSync(path.join(home, '.gemini/config/mcp_config.json'), 'utf8'));
          const legacy = JSON.parse(fs.readFileSync(path.join(home, '.gemini/antigravity-cli/mcp_config.json'), 'utf8'));
          const idePlugin = path.join(home, '.gemini/config/plugins/weppy-roblox-ai-toolkit/mcp_config.json');
          const cliPlugin = path.join(home, '.gemini/antigravity-cli/plugins/weppy-roblox-ai-toolkit/mcp_config.json');
          const count = Number(Boolean(shared.mcpServers?.['weppy-roblox-mcp'])) + Number(Boolean(legacy.mcpServers?.['weppy-roblox-mcp'])) + Number(fs.existsSync(idePlugin)) + Number(fs.existsSync(cliPlugin));
          if (count !== 1) throw new Error(`expected one migrated WEPPY definition, found ${count}`);
          if (!shared.mcpServers?.['other-server'] || !legacy.mcpServers?.['other-server'] || legacy.topLevel !== 'keep') throw new Error('non-WEPPY config was not preserved');
          NODE

      - name: Verify — plugin file exists
        run: |
          PLUGIN_PATH="$HOME/Documents/Roblox/Plugins/WeppyRobloxMCP.rbxm"
          if [ ! -f "$PLUGIN_PATH" ]; then
            echo "❌ Plugin not found: $PLUGIN_PATH"
            exit 1
          fi
          echo "✓ Plugin found: $PLUGIN_PATH"

      - name: Verify — Claude Code config registered
        run: |
          result=$(claude mcp list 2>&1)
          if ! echo "$result" | grep -q 'weppy-roblox-mcp'; then
            echo "❌ weppy-roblox-mcp not found in claude mcp list"
            echo "Output: $result"
            exit 1
          fi
          if ! echo "$result" | grep -q '@weppy/roblox-mcp@latest'; then
            echo "❌ Claude Code entry does not use @weppy/roblox-mcp@latest"
            echo "Output: $result"
            exit 1
          fi
          echo "✓ weppy-roblox-mcp registered with @latest"

      - name: Verify — Claude Code AI Agent Plugin installed
        run: |
          if ! grep -q 'hope1026/weppy-roblox-mcp' "$HOME/.claude/weppy-marketplace-added"; then
            echo "❌ Claude Code marketplace add was not called"
            ls -la "$HOME/.claude" || true
            exit 1
          fi
          if ! grep -q 'weppy-roblox-ai-toolkit@hope1026-roblox-mcp' "$HOME/.claude/weppy-plugin-installed"; then
            echo "❌ Claude Code plugin install was not called"
            ls -la "$HOME/.claude" || true
            exit 1
          fi
          echo "✓ Claude Code AI Agent Plugin install called"

      - name: Verify — Codex config registered
        run: |
          if ! grep -q '\[mcp_servers.weppy-roblox-mcp\]' "$HOME/.codex/config.toml"; then
            echo "❌ weppy-roblox-mcp not found in ~/.codex/config.toml"
            cat "$HOME/.codex/config.toml"
            exit 1
          fi
          if ! grep -q '@weppy/roblox-mcp@latest' "$HOME/.codex/config.toml"; then
            echo "❌ Codex entry does not use @weppy/roblox-mcp@latest"
            cat "$HOME/.codex/config.toml"
            exit 1
          fi
          echo "✓ weppy-roblox-mcp registered in Codex config with @latest"

      - name: Verify — Codex marketplace added
        run: |
          if ! grep -q 'hope1026/weppy-roblox-mcp' "$HOME/.codex/weppy-marketplace-added"; then
            echo "❌ Codex marketplace add was not called"
            ls -la "$HOME/.codex" || true
            exit 1
          fi
          echo "✓ Codex marketplace add called"

      - name: Verify — MCP server responds to initialize + tools/list
        env:
          MCP_TIMEOUT: '90000'
        run: node .github/scripts/mcp-smoke.mjs

  test-powershell:
    name: E2E — install.ps1 (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Stub Claude Code CLI binary (force plugin install path)
        shell: pwsh
        run: |
          $stubDir = Join-Path $env:RUNNER_TEMP 'claude-stub'
          New-Item -ItemType Directory -Path $stubDir -Force | Out-Null

          $stubJs = @'
          const fs = require('fs');
          const path = require('path');
          const args = process.argv.slice(2);
          const home = process.env.USERPROFILE || process.env.HOME;
          const claudeDir = path.join(home, '.claude');
          fs.mkdirSync(claudeDir, { recursive: true });
          if (args[0] === 'mcp' && args[1] === 'list') {
            const marker = path.join(claudeDir, 'weppy-mcp-added');
            if (fs.existsSync(marker)) {
              console.log('weppy-roblox-mcp: npx -y @weppy/roblox-mcp@latest');
            }
          } else if (args[0] === 'mcp' && args[1] === 'remove') {
            fs.rmSync(path.join(claudeDir, 'weppy-mcp-added'), { force: true });
          } else if (args[0] === 'mcp' && args[1] === 'add') {
            fs.writeFileSync(path.join(claudeDir, 'weppy-mcp-added'), args.join(' '));
            fs.writeFileSync(path.join(claudeDir, 'mcp.json'), JSON.stringify({
              mcpServers: {
                'weppy-roblox-mcp': {
                  command: 'npx',
                  args: ['-y', '@weppy/roblox-mcp@latest'],
                },
              },
            }, null, 2));
          } else if (args[0] === 'plugin' && args[1] === 'marketplace' && args[2] === 'add') {
            fs.writeFileSync(path.join(claudeDir, 'weppy-marketplace-added'), args[3] || '');
          } else if (args[0] === 'plugin' && args[1] === 'install') {
            fs.writeFileSync(path.join(claudeDir, 'weppy-plugin-installed'), args[2] || '');
          }
          process.exit(0);
          '@
          Set-Content -Path (Join-Path $stubDir 'claude-stub.js') -Value $stubJs -Encoding UTF8

          $stubCmd = "@echo off`r`nnode `"$stubDir\claude-stub.js`" %*"
          Set-Content -Path (Join-Path $stubDir 'claude.cmd') -Value $stubCmd -Encoding ASCII
          Add-Content -Path $env:GITHUB_PATH -Value $stubDir

      - name: Stub codex CLI binary (force CLI detection path)
        shell: pwsh
        run: |
          # Stub `codex` via a Node.js helper. Earlier attempts using a
          # cmd → pwsh → param wrapper kept losing the `--` separator
          # in install.ps1's `codex mcp add NAME -- CMD ARGS...` call;
          # node receives argv verbatim, sidestepping that whole chain.
          $stubDir = Join-Path $env:RUNNER_TEMP 'codex-stub'
          New-Item -ItemType Directory -Path $stubDir -Force | Out-Null

          $stubJs = @'
          const fs = require('fs');
          const path = require('path');
          const args = process.argv.slice(2);
          if (args[0] === 'mcp' && args[1] === 'add') {
            const rest = args.slice(2);
            const name = rest[0];
            const idx = rest[1] === '--' ? 2 : 1;
            const cmd = rest[idx];
            const cmdArgs = rest.slice(idx + 1);
            const argsJson = cmdArgs.map((a) => '"' + a + '"').join(', ');
            const home = process.env.USERPROFILE || process.env.HOME;
            const codexDir = path.join(home, '.codex');
            fs.mkdirSync(codexDir, { recursive: true });
            const block = '\n[mcp_servers.' + name + ']\ncommand = "' + cmd + '"\nargs = [' + argsJson + ']\n';
            fs.appendFileSync(path.join(codexDir, 'config.toml'), block);
          } else if (args[0] === 'plugin' && args[1] === 'marketplace' && args[2] === 'add') {
            const home = process.env.USERPROFILE || process.env.HOME;
            const codexDir = path.join(home, '.codex');
            fs.mkdirSync(codexDir, { recursive: true });
            fs.writeFileSync(path.join(codexDir, 'weppy-marketplace-added'), args[3] || '');
          }
          process.exit(0);
          '@
          Set-Content -Path (Join-Path $stubDir 'codex-stub.js') -Value $stubJs -Encoding UTF8

          $stubCmd = "@echo off`r`nnode `"$stubDir\codex-stub.js`" %*"
          Set-Content -Path (Join-Path $stubDir 'codex.cmd') -Value $stubCmd -Encoding ASCII
          Add-Content -Path $env:GITHUB_PATH -Value $stubDir

      - name: Stub Antigravity CLI binary on Windows
        shell: pwsh
        run: |
          $stubDir = Join-Path $env:RUNNER_TEMP 'agy-stub'
          New-Item -ItemType Directory -Path $stubDir -Force | Out-Null
          $stubJs = @'
          const fs = require('fs');
          const path = require('path');
          const args = process.argv.slice(2);
          const home = process.env.USERPROFILE || process.env.HOME;
          const target = path.join(home, '.gemini', 'antigravity-cli', 'plugins', 'weppy-roblox-ai-toolkit');
          if (process.env.WEPPY_AGY_FAIL === '1' && args[0] === 'plugin') process.exit(9);
          if (args[0] === 'plugin' && args[1] === 'install') {
            const source = args[2];
            if (!fs.existsSync(path.join(source, 'plugin.json'))) process.exit(2);
            if (fs.existsSync(path.join(source, '.claude-plugin'))) process.exit(4);
            fs.rmSync(target, { recursive: true, force: true });
            fs.mkdirSync(path.dirname(target), { recursive: true });
            fs.cpSync(source, target, { recursive: true });
          } else if (args[0] === 'plugin' && args[1] === 'list') {
            if (fs.existsSync(path.join(target, 'plugin.json'))) console.log('weppy-roblox-ai-toolkit enabled');
          } else if (args[0] === 'plugin' && args[1] === 'uninstall') {
            fs.rmSync(target, { recursive: true, force: true });
          }
          process.exit(0);
          '@
          Set-Content -Path (Join-Path $stubDir 'agy-stub.js') -Value $stubJs -Encoding UTF8
          $stubCmd = "@echo off`r`nnode `"$stubDir\agy-stub.js`" %*"
          Set-Content -Path (Join-Path $stubDir 'agy.cmd') -Value $stubCmd -Encoding ASCII
          Add-Content -Path $env:GITHUB_PATH -Value $stubDir

      - name: Verify — Antigravity reinstall outcome matrix on Windows
        shell: pwsh
        env:
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}\plugins\weppy-roblox-mcp
        run: |
          $pluginSource = $env:WEPPY_ANTIGRAVITY_PLUGIN_SOURCE
          $pwshPath = (Get-Command pwsh.exe).Source
          $agyStub = Join-Path $env:RUNNER_TEMP 'agy-stub\agy.cmd'
          $basePath = (($env:PATH -split ';') | Where-Object {
            $_ -and $_ -notmatch 'agy-stub|claude-stub|codex-stub'
          }) -join ';'

          function Copy-NativePlugin($Target) {
            New-Item -ItemType Directory -Path $Target -Force | Out-Null
            Copy-Item (Join-Path $pluginSource '*') $Target -Recurse -Force
            Remove-Item (Join-Path $Target '.claude-plugin') -Recurse -Force -ErrorAction SilentlyContinue
          }

          function Invoke-AntigravityFixture($Name, $ExpectedStatus, $Mode) {
            $fixtureHome = Join-Path $env:RUNNER_TEMP ([Guid]::NewGuid().ToString('N'))
            $fixtureBin = Join-Path $fixtureHome 'bin'
            $target = Join-Path $fixtureHome '.gemini\antigravity-cli\plugins\weppy-roblox-ai-toolkit'
            $log = Join-Path $fixtureHome 'install.log'
            New-Item -ItemType Directory -Path $fixtureBin -Force | Out-Null
            Set-Content (Join-Path $fixtureBin 'npm.cmd') "@echo off`r`nexit /b 0" -Encoding ASCII
            Set-Content (Join-Path $fixtureBin 'npx.cmd') "@echo off`r`nexit /b 0" -Encoding ASCII
            if ($Mode -notin @('cli-missing', 'unrecoverable')) {
              Copy-Item $agyStub (Join-Path $fixtureBin 'agy.cmd') -Force
            }

            switch ($Mode) {
              'current' {
                Copy-NativePlugin $target
              }
              'outdated' {
                Copy-NativePlugin $target
                $manifestPath = Join-Path $target 'plugin.json'
                $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
                $manifest.description = 'old release'
                $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath -Encoding UTF8
              }
              'damaged' {
                Copy-NativePlugin $target
                Remove-Item (Join-Path $target 'skills\weppy-roblox-assets-guide\SKILL.md') -Force
              }
              'install-failure' {
                Copy-NativePlugin $target
                Set-Content (Join-Path $target 'rollback-marker') 'preserve-me' -Encoding UTF8
              }
              'unrecoverable' {
                $geminiDir = Join-Path $fixtureHome '.gemini'
                New-Item -ItemType Directory -Path $geminiDir -Force | Out-Null
                Set-Content (Join-Path $geminiDir 'config') 'blocked' -Encoding UTF8
              }
            }

            $savedProfile = $env:USERPROFILE
            $savedHome = $env:HOME
            $savedAppData = $env:APPDATA
            $savedLocalAppData = $env:LOCALAPPDATA
            $savedPath = $env:PATH
            $savedCi = $env:CI
            $savedIde = $env:WEPPY_ANTIGRAVITY_IDE_PRESENT
            $savedFailure = $env:WEPPY_AGY_FAIL
            try {
              $env:USERPROFILE = $fixtureHome
              $env:HOME = $fixtureHome
              $env:APPDATA = Join-Path $fixtureHome 'AppData\Roaming'
              $env:LOCALAPPDATA = Join-Path $fixtureHome 'AppData\Local'
              $env:PATH = "$fixtureBin;$basePath"
              $env:CI = 'true'
              $env:WEPPY_ANTIGRAVITY_IDE_PRESENT = if ($Mode -in @('cli-missing', 'unrecoverable')) { '1' } else { '0' }
              $env:WEPPY_AGY_FAIL = if ($Mode -eq 'install-failure') { '1' } else { $null }
              & $pwshPath -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\install.ps1" *> $log
              $fixtureExit = $LASTEXITCODE
            }
            finally {
              $env:USERPROFILE = $savedProfile
              $env:HOME = $savedHome
              $env:APPDATA = $savedAppData
              $env:LOCALAPPDATA = $savedLocalAppData
              $env:PATH = $savedPath
              $env:CI = $savedCi
              $env:WEPPY_ANTIGRAVITY_IDE_PRESENT = $savedIde
              $env:WEPPY_AGY_FAIL = $savedFailure
            }

            if (-not (Select-String -Path $log -SimpleMatch $ExpectedStatus -Quiet)) {
              Get-Content $log
              throw "$Name did not emit $ExpectedStatus"
            }
            if (Select-String -Path $log -Pattern 'Antigravity.*skipped or failed|skipped or failed.*Antigravity' -Quiet) {
              Get-Content $log
              throw "$Name emitted an ambiguous Antigravity warning"
            }
            if ($Mode -eq 'unrecoverable') {
              if ($fixtureExit -eq 0) { throw "$Name unexpectedly succeeded" }
              Write-Host "✓ $Name"
              return
            }
            if ($fixtureExit -ne 0) { throw "$Name failed with exit $fixtureExit" }

            $sharedPath = Join-Path $fixtureHome '.gemini\config\mcp_config.json'
            $nativeMcp = Join-Path $target 'mcp_config.json'
            $sharedCount = 0
            if (Test-Path $sharedPath) {
              $shared = Get-Content $sharedPath -Raw | ConvertFrom-Json
              $sharedCount = [int]($null -ne $shared.mcpServers.'weppy-roblox-mcp')
            }
            $activeCount = $sharedCount + [int](Test-Path $nativeMcp)
            if ($activeCount -ne 1) { throw "$Name expected one WEPPY MCP definition, found $activeCount" }
            if ($Mode -eq 'cli-missing') {
              if (Test-Path $target) { throw "$Name unexpectedly installed a plugin" }
            }
            else {
              @(
                'skills\weppy-roblox-mcp-guide\SKILL.md',
                'skills\weppy-roblox-sync-guide\SKILL.md',
                'skills\weppy-roblox-assets-guide\SKILL.md'
              ) | ForEach-Object {
                if (-not (Test-Path (Join-Path $target $_))) { throw "$Name missing CLI skill: $_" }
              }
            }
            if ($Mode -eq 'install-failure' -and -not (Test-Path (Join-Path $target 'rollback-marker'))) {
              throw "$Name did not restore the previous plugin"
            }
            Write-Host "✓ $Name"
          }

          Invoke-AntigravityFixture 'Antigravity clean install' 'installed:' 'clean'
          Invoke-AntigravityFixture 'Antigravity current reinstall' 'reinstalled:' 'current'
          Invoke-AntigravityFixture 'Antigravity outdated update' 'updated:' 'outdated'
          Invoke-AntigravityFixture 'Antigravity damaged repair' 'repaired:' 'damaged'
          Invoke-AntigravityFixture 'Antigravity CLI missing fallback' 'fallback:' 'cli-missing'
          Invoke-AntigravityFixture 'Antigravity install failure rollback' 'fallback:' 'install-failure'
          Invoke-AntigravityFixture 'Antigravity unrecoverable failure' 'failed:' 'unrecoverable'

      - name: Seed Antigravity Windows fallback profiles
        shell: pwsh
        run: |
          $sharedDir = Join-Path $env:USERPROFILE '.gemini\config'
          $cliDir = Join-Path $env:USERPROFILE '.gemini\antigravity-cli'
          New-Item -ItemType Directory -Path $sharedDir -Force | Out-Null
          New-Item -ItemType Directory -Path $cliDir -Force | Out-Null
          @{
            mcpServers = @{
              'other-server' = @{ command = 'other-command'; args = @() }
            }
          } | ConvertTo-Json -Depth 10 | Set-Content (Join-Path $sharedDir 'mcp_config.json') -Encoding UTF8
          @{
            mcpServers = @{
              'weppy-roblox-mcp' = @{ command = 'npx'; args = @('-y', '@weppy/roblox-mcp@latest') }
            }
          } | ConvertTo-Json -Depth 10 | Set-Content (Join-Path $cliDir 'mcp_config.json') -Encoding UTF8

      - name: Run install.ps1 (CI mode, pipe — simulates irm | iex)
        env:
          CI: true
          WEPPY_ANTIGRAVITY_IDE_PRESENT: '1'
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}\plugins\weppy-roblox-mcp
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP 'install-output.log'
          Get-Content install.ps1 -Raw | Invoke-Expression *>&1 | Tee-Object -FilePath $log
           if (Select-String -Path $log -Pattern 'SyntaxError' -Quiet) {
            Write-Error "❌ SyntaxError detected in install output"
            exit 1
           }

      - name: Verify — Antigravity IDE and CLI hybrid mode on Windows
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP 'install-output.log'
          if (-not (Select-String -Path $log -SimpleMatch 'Windows Antigravity IDE plugin discovery is unverified; MCP fallback preserved' -Quiet)) {
            throw 'Windows Antigravity IDE discovery warning is missing'
          }
          $configPath = Join-Path $env:USERPROFILE '.gemini\config\mcp_config.json'
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          if (-not $config.mcpServers.'other-server') { throw 'other-server was not preserved' }
          if (-not $config.mcpServers.'weppy-roblox-mcp') { throw 'shared WEPPY MCP fallback is missing' }
          $pluginTarget = Join-Path $env:USERPROFILE '.gemini\config\plugins\weppy-roblox-ai-toolkit'
          if (Test-Path $pluginTarget) { throw 'unverified Windows IDE plugin path must not be staged' }
          $cliPluginConfig = Join-Path $env:USERPROFILE '.gemini\antigravity-cli\plugins\weppy-roblox-ai-toolkit\mcp_config.json'
          if (Test-Path $cliPluginConfig) { throw 'hybrid CLI plugin retained native MCP config' }
          Write-Host '✓ Antigravity IDE and CLI hybrid mode verified on Windows'

      - name: Verify — Antigravity legacy config migration on Windows
        shell: pwsh
        run: |
          $target = Join-Path $env:USERPROFILE '.gemini\antigravity-cli\plugins\weppy-roblox-ai-toolkit'
          @(
            'plugin.json',
            'skills\weppy-roblox-mcp-guide\SKILL.md',
            'skills\weppy-roblox-sync-guide\SKILL.md',
            'skills\weppy-roblox-assets-guide\SKILL.md'
          ) | ForEach-Object {
            if (-not (Test-Path (Join-Path $target $_))) { throw "Missing hybrid plugin file: $_" }
          }
          if (Test-Path (Join-Path $target '.claude-plugin')) { throw 'Claude manifest leaked into native view' }
          if (Test-Path (Join-Path $target 'mcp_config.json')) { throw 'hybrid plugin retained native MCP config' }
          $legacyPath = Join-Path $env:USERPROFILE '.gemini\antigravity-cli\mcp_config.json'
          $cliConfig = Get-Content $legacyPath -Raw | ConvertFrom-Json
          if ($cliConfig.mcpServers.'weppy-roblox-mcp') { throw 'duplicate CLI direct MCP remains' }
          if (-not (Get-ChildItem "$legacyPath.weppy-backup-*" -ErrorAction SilentlyContinue)) { throw 'legacy config backup is missing' }
          Write-Host '✓ Antigravity legacy config migration verified on Windows'

      - name: Verify — Antigravity CLI native-only mode on Windows
        shell: pwsh
        env:
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}\plugins\weppy-roblox-mcp
        run: |
          $fixtureHome = Join-Path $env:RUNNER_TEMP ("weppy-agy-native-" + [Guid]::NewGuid().ToString('N'))
          $fixtureBin = Join-Path $fixtureHome 'bin'
          New-Item -ItemType Directory -Path $fixtureBin -Force | Out-Null
          Set-Content (Join-Path $fixtureBin 'npm.cmd') "@echo off`r`nexit /b 0" -Encoding ASCII
          Set-Content (Join-Path $fixtureBin 'npx.cmd') "@echo off`r`nexit /b 0" -Encoding ASCII
          $env:USERPROFILE = $fixtureHome
          $env:HOME = $fixtureHome
          $env:APPDATA = Join-Path $fixtureHome 'AppData\Roaming'
          $env:LOCALAPPDATA = Join-Path $fixtureHome 'AppData\Local'
          $env:PATH = "$fixtureBin;$env:PATH"
          $env:CI = 'true'
          & pwsh -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\install.ps1" *> (Join-Path $fixtureHome 'install.log')
          if ($LASTEXITCODE -ne 0) { throw 'native-only installer fixture failed' }
          $sharedPath = Join-Path $fixtureHome '.gemini\config\mcp_config.json'
          $pluginConfig = Join-Path $fixtureHome '.gemini\antigravity-cli\plugins\weppy-roblox-ai-toolkit\mcp_config.json'
          $sharedCount = 0
          if (Test-Path $sharedPath) {
            $shared = Get-Content $sharedPath -Raw | ConvertFrom-Json
            if ($shared.mcpServers.'weppy-roblox-mcp') { $sharedCount = 1 }
          }
          $count = $sharedCount + [int](Test-Path $pluginConfig)
          if ($count -ne 1 -or -not (Test-Path $pluginConfig)) { throw "expected one native WEPPY definition, found $count" }

      - name: Verify — Antigravity native failure fallback on Windows
        shell: pwsh
        env:
          WEPPY_ANTIGRAVITY_PLUGIN_SOURCE: ${{ github.workspace }}\plugins\weppy-roblox-mcp
        run: |
          $fixtureHome = Join-Path $env:RUNNER_TEMP ("weppy-agy-failure-" + [Guid]::NewGuid().ToString('N'))
          $fixtureBin = Join-Path $fixtureHome 'bin'
          New-Item -ItemType Directory -Path $fixtureBin -Force | Out-Null
          Set-Content (Join-Path $fixtureBin 'npm.cmd') "@echo off`r`nexit /b 0" -Encoding ASCII
          Set-Content (Join-Path $fixtureBin 'npx.cmd') "@echo off`r`nexit /b 0" -Encoding ASCII
          $env:USERPROFILE = $fixtureHome
          $env:HOME = $fixtureHome
          $env:APPDATA = Join-Path $fixtureHome 'AppData\Roaming'
          $env:LOCALAPPDATA = Join-Path $fixtureHome 'AppData\Local'
          $env:PATH = "$fixtureBin;$env:PATH"
          $env:CI = 'true'
          $env:WEPPY_AGY_FAIL = '1'
          $log = Join-Path $fixtureHome 'install.log'
          & pwsh -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\install.ps1" *> $log
          if ($LASTEXITCODE -ne 0) { throw 'native failure installer fixture failed' }
          if (-not (Select-String -Path $log -Pattern 'MCP fallback preserved' -Quiet)) { throw 'fallback status was not reported' }
          $sharedPath = Join-Path $fixtureHome '.gemini\config\mcp_config.json'
          $pluginConfig = Join-Path $fixtureHome '.gemini\antigravity-cli\plugins\weppy-roblox-ai-toolkit\mcp_config.json'
          $shared = Get-Content $sharedPath -Raw | ConvertFrom-Json
          $count = [int]($null -ne $shared.mcpServers.'weppy-roblox-mcp') + [int](Test-Path $pluginConfig)
          if ($count -ne 1 -or (Test-Path $pluginConfig)) { throw "expected one shared fallback definition, found $count" }

      - name: Verify — plugin file exists
        shell: pwsh
        run: |
          $pluginPath = Join-Path $env:LOCALAPPDATA "Roblox\Plugins\WeppyRobloxMCP.rbxm"
          if (-not (Test-Path $pluginPath)) {
            Write-Error "❌ Plugin not found: $pluginPath"
            exit 1
          }
          Write-Host "✓ Plugin found: $pluginPath"

      - name: Verify — Claude Code config registered
        shell: pwsh
        run: |
          # claude mcp add는 ~/.claude.json에, 폴백은 ~/.claude/mcp.json에 씁니다
          $found = $false
          $usesLatest = $false
          @("$env:USERPROFILE\.claude.json", "$env:USERPROFILE\.claude\mcp.json") | ForEach-Object {
            if (Test-Path $_) {
              $content = Get-Content $_ -Raw
              if ($content -match 'weppy-roblox-mcp') {
                $found = $true
              }
              if ($content -match '@weppy/roblox-mcp@latest') {
                $usesLatest = $true
              }
            }
          }
          if (-not $found) {
            Write-Error "❌ weppy-roblox-mcp not found in claude config files"
            exit 1
          }
          if (-not $usesLatest) {
            Write-Error "❌ Claude Code entry does not use @weppy/roblox-mcp@latest"
            exit 1
          }
          Write-Host "✓ weppy-roblox-mcp registered with @latest"

      - name: Verify — Claude Code AI Agent Plugin installed
        shell: pwsh
        run: |
          $claudeDir = Join-Path $env:USERPROFILE '.claude'
          $marketplaceMarker = Join-Path $claudeDir 'weppy-marketplace-added'
          $pluginMarker = Join-Path $claudeDir 'weppy-plugin-installed'
          if (-not ((Get-Content $marketplaceMarker -Raw) -match 'hope1026/weppy-roblox-mcp')) {
            Write-Error "❌ Claude Code marketplace add was not called"
            Get-ChildItem $claudeDir -Force
            exit 1
          }
          if (-not ((Get-Content $pluginMarker -Raw) -match 'weppy-roblox-ai-toolkit@hope1026-roblox-mcp')) {
            Write-Error "❌ Claude Code plugin install was not called"
            Get-ChildItem $claudeDir -Force
            exit 1
          }
          Write-Host "✓ Claude Code AI Agent Plugin install called"

      - name: Verify — Codex config registered
        shell: pwsh
        run: |
          $codexConfig = Join-Path $env:USERPROFILE '.codex\config.toml'
          $content = Get-Content $codexConfig -Raw
          if (-not ($content -match '\[mcp_servers\.weppy-roblox-mcp\]')) {
            Write-Error "❌ weppy-roblox-mcp not found in ~/.codex/config.toml"
            Get-Content $codexConfig
            exit 1
          }
          if (-not ($content -match '@weppy/roblox-mcp@latest')) {
            Write-Error "❌ Codex entry does not use @weppy/roblox-mcp@latest"
            Get-Content $codexConfig
            exit 1
          }
          Write-Host "✓ weppy-roblox-mcp registered in Codex config with @latest"

      - name: Verify — Codex marketplace added
        shell: pwsh
        run: |
          $marketplaceMarker = Join-Path $env:USERPROFILE '.codex\weppy-marketplace-added'
          if (-not ((Get-Content $marketplaceMarker -Raw) -match 'hope1026/weppy-roblox-mcp')) {
            Write-Error "❌ Codex marketplace add was not called"
            Get-ChildItem (Join-Path $env:USERPROFILE '.codex') -Force
            exit 1
          }
          Write-Host "✓ Codex marketplace add called"

      - name: Verify — MCP server responds to initialize + tools/list
        shell: pwsh
        env:
          MCP_TIMEOUT: '90000'
        run: node .github/scripts/mcp-smoke.mjs
